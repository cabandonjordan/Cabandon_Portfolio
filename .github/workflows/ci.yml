name: Portfolio CI

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Test across the current stable Node.js versions
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    # 1. Grab the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up the Node.js environment
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 3. Install dependencies exactly as defined in package-lock.json
    - name: Install dependencies
      run: npm ci

    # 4. Run ESLint to catch syntax or styling errors
    - name: Run Linter
      run: npm run lint

    # 5. Build the Vite React app to ensure it compiles successfully
    - name: Build Project
      run: npm run build